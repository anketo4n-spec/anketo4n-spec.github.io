<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наш Чат</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-card { background: #1e293b; border-radius: 12px; padding: 20px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #chat { border: 1px solid #334155; height: 350px; overflow-y: auto; padding: 10px; border-radius: 8px; background: #0f172a; margin-bottom: 15px; }
        .msg { margin: 8px 0; padding: 8px 12px; border-radius: 6px; background: #334155; word-wrap: break-word; }
        .inputs { display: flex; gap: 8px; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
        #name { width: 30%; }
        #message { flex-grow: 1; }
        button { padding: 10px 15px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="chat-card">
    <h2>💬 Мессенджер для друзей</h2>
    <div id="chat"></div>
    <div class="inputs">
        <input type="text" id="name" placeholder="Имя" value="Друг">
        <input type="text" id="message" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Отправить</button>
    </div>
</div>

<script>
    // Публичный бесплатный эхо-сервер WebSocket для тестов
    const ws = new WebSocket("wss://free.qrster.com/ws");

    ws.onmessage = function(event) {
        const chat = document.getElementById('chat');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg';
        msgDiv.textContent = event.data;
        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;
    };

    function send() {
        const name = document.getElementById('name').value;
        const input = document.getElementById('message');
        if (input.value.trim() !== '') {
            const fullMsg = name + ": " + input.value;
            ws.send(fullMsg);
            input.value = '';
        }
    }
</script>

</body>
</html>
