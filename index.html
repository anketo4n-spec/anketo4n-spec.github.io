<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0f172a; color: white; display: flex; height: 100vh; height: 100dvh; overflow: hidden; }
        
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 15px; }
        .box { background: #1e293b; padding: 25px; border-radius: 16px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 14px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid #334155; }
        .box h2 { text-align: center; color: #38bdf8; font-size: 20px; }
        
        .profile-card { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .profile-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; background: #0284c7; color: white; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; border: 3px solid #38bdf8; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
        
        #app { display: none; width: 100vw; height: 100vh; height: 100dvh; position: relative; overflow: hidden; }
        .sidebar { width: 340px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; height: 100%; flex-shrink: 0; transition: transform 0.25s ease; }
        .sidebar-header { padding: 14px 16px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .search-box { padding: 10px 16px; border-bottom: 1px solid #334155; }
        .user-list { flex: 1; overflow-y: auto; }
        
        .user-item { padding: 12px 16px; border-bottom: 1px solid #1e293b; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.15s; }
        .user-item:hover, .user-item.active { background: #334155; }
        
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: #0284c7; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; object-fit: cover; flex-shrink: 0; }
        .user-info { display: flex; flex-direction: column; overflow: hidden; }
        .user-info .name { font-weight: 600; color: #f8fafc; display: flex; align-items: center; gap: 4px; font-size: 15px; }
        .user-info .sub { font-size: 13px; color: #94a3b8; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0f172a; height: 100%; transition: transform 0.25s ease; }
        .chat-header { padding: 12px 16px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; height: 65px; }
        .messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 14px; word-break: break-word; line-height: 1.4; font-size: 15px; }
        .msg.my { background: #2563eb; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.their { background: #334155; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* 🎥 ТЕЛЕГРАМ-КРУЖОК */
        .video-note { width: 200px; height: 200px; border-radius: 50%; object-fit: cover; border: 3px solid #38bdf8; background: black; }
        .msg.video-msg { background: transparent !important; padding: 0 !important; }

        /* Контейнер записи видео с кнопками и таймером по углам */
        .video-container { position: relative; width: 200px; height: 200px; margin: 10px 0; }
        #video-preview { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #ef4444; background: black; transform: scaleX(-1); }
        
        /* Снизу слева — Таймер */
        #video-timer { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; color: #ef4444; border: 1px solid #ef4444; }
        
        /* Снизу справа — Кнопка звука */
        #mute-btn { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); border: 1px solid #334155; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; padding: 0; }
        
        .input-area { padding: 12px 16px; background: #1e293b; display: flex; gap: 8px; border-top: 1px solid #334155; align-items: center; }
        input { padding: 11px 14px; border-radius: 10px; border: 1px solid #475569; background: #0f172a; color: white; width: 100%; outline: none; font-size: 15px; }
        input:focus { border-color: #38bdf8; }
        button { padding: 11px 16px; background: #2563eb; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; }
        button:hover { background: #1d4ed8; }
        
        .video-rec-btn { background: #0284c7; padding: 11px 14px; border-radius: 10px; border: none; color: white; cursor: pointer; font-size: 16px; }

        .back-btn { display: none; background: transparent; padding: 6px; font-size: 20px; color: #38bdf8; border: none; }
        .verified { color: #38bdf8; display: inline-flex; align-items: center; }
        .admin-btn { background: #ef4444; }
        .admin-btn:hover { background: #dc2626; }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; inset: 0; z-index: 10; }
            .chat-area { width: 100%; position: absolute; inset: 0; z-index: 20; transform: translateX(100%); }
            #app.chat-open .chat-area { transform: translateX(0); }
            .back-btn { display: block; }
            .msg { max-width: 85%; }
            .video-note { width: 170px; height: 170px; }
        }
    </style>
</head>
<body>

    <!-- Экран Записи Видео (Превью) -->
    <div id="video-preview-modal" class="modal" style="display:none;">
        <div class="box" style="align-items:center;">
            <h2>Запись кружка</h2>
            <div class="video-container">
                <video id="video-preview" autoplay muted playsinline></video>
                <!-- Снизу слева -->
                <div id="video-timer">0:30</div>
                <!-- Снизу справа -->
                <button id="mute-btn" onclick="toggleMute()" title="Включить/Выключить звук">🔊</button>
            </div>
            <button onclick="stopAndSendVideo()" style="background:#ef4444; width:100%;">🛑 Отправить</button>
            <button onclick="cancelVideo()" style="background:#475569; width:100%;">Отмена</button>
        </div>
    </div>

    <!-- Авторизация -->
    <div id="auth-screen" class="modal">
        <div class="box">
            <h2>Вход в Messenger</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            <input type="text" id="display_name" placeholder="Отображаемое имя">
            <input type="text" id="username" placeholder="Юзернейм (@username)">
            <button onclick="register()">Зарегистрироваться</button>
            <button onclick="login()" style="background:#475569;">Войти</button>
        </div>
    </div>

    <!-- Модалка Профиля -->
    <div id="profile-modal" class="modal" style="display:none;">
        <div class="box">
            <div class="profile-card">
                <div id="view-avatar-box"></div>
                <h3 id="view-name" style="margin-top:5px; font-size:18px;"></h3>
                <span id="view-username" style="color:#94a3b8; font-size:14px;"></span>
            </div>

            <div id="edit-profile-section" style="display:none; flex-direction:column; gap:10px; margin-top:10px;">
                <hr style="border:0; border-top:1px solid #334155;">
                <label style="font-size:12px; color:#94a3b8;">Изменить имя:</label>
                <input type="text" id="edit-display-name">
                <label style="font-size:12px; color:#94a3b8;">Загрузить аватар (PNG / JPG):</label>
                <input type="file" id="avatar-file-input" accept="image/png, image/jpeg, image/jpg" style="font-size:12px;">
                <button onclick="saveProfile()" style="margin-top:5px;">Сохранить изменения</button>
            </div>

            <button onclick="closeProfile()" style="background:#475569; margin-top:5px;">Закрыть</button>
        </div>
    </div>

    <!-- Модалка Админки -->
    <div id="admin-modal" class="modal" style="display:none;">
        <div class="box" style="max-width:450px;">
            <h2>👑 Панель Админа (@anketo)</h2>
            <div id="admin-user-list" style="max-height:300px; overflow-y:auto; display:flex; flex-direction:column; gap:8px;"></div>
            <button onclick="closeAdmin()" style="background:#475569; margin-top:10px;">Закрыть</button>
        </div>
    </div>

    <!-- Главный Интерфейс -->
    <div id="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <div onclick="openMyProfile()" style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                    <div id="my-avatar" class="avatar">?</div>
                    <span id="my-name" style="font-weight:600; font-size:15px;">Мой профиль</span>
                </div>
                <button id="admin-panel-btn" class="admin-btn" style="display:none; font-size:12px; padding:6px 10px;" onclick="openAdmin()">👑</button>
            </div>
            <div class="search-box">
                <input type="text" id="search" placeholder="Поиск по имени или @username..." oninput="onSearchInput()">
            </div>
            <div class="user-list" id="user-list"></div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <button class="back-btn" onclick="closeChatMobile()">←</button>
                <div id="chat-header-info" onclick="openSelectedUserProfile()" style="display:flex; align-items:center; gap:10px; cursor:pointer; overflow:hidden;">
                    <span id="chat-header-title" style="font-weight:600; color:#f8fafc; font-size:16px;">Выберите чат</span>
                </div>
                <button onclick="logout()" style="background:#475569; font-size:12px; padding:6px 10px; margin-left:auto;">Выйти</button>
            </div>
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <button class="video-rec-btn" onclick="startVideoRecording()" title="Записать кружок">🎥</button>
                <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()">></button>
            </div>
        </div>
    </div>

<script>
    const SUPABASE_URL = "https://elygkutxqqesczazyrkq.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVseWdrdXR4cXFlc2N6YXp5cmtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2OTA3NDIsImV4cCI6MjEwMDI2Njc0Mn0.HtKdXas8bY-BoGlwxv6YtZGtEwI2WbCbzhYsHF5T6DM";
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentProfile = null;
    let selectedUser = null;

    // Переменные записи
    let mediaRecorder = null;
    let videoChunks = [];
    let mediaStream = null;
    let recordTimerInterval = null;
    let recordTimeLeft = 30;
    let isMuted = false;

    window.onload = async () => {
        const { data: { session } } = await db.auth.getSession();
        if (session) {
            currentUser = session.user;
            await loadProfile();
            showApp();
        }
    };

    function cleanUsername(raw) { return raw.replace(/@+/g, '').trim().toLowerCase(); }

    function renderAvatarHTML(profile, isBig = false) {
        const name = profile.display_name || profile.username || 'U';
        const cssClass = isBig ? 'profile-avatar' : 'avatar';
        if (profile.avatar_url) return `<img class="${cssClass}" src="${profile.avatar_url}" alt="avatar">`;
        return `<div class="${cssClass}">${name.charAt(0).toUpperCase()}</div>`;
    }

    async function loadProfile() {
        const { data } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
        if (!data) return;
        currentProfile = data;
        
        document.getElementById('my-name').textContent = currentProfile.display_name || '@' + currentProfile.username;
        const avatarBox = document.getElementById('my-avatar');
        if (avatarBox) avatarBox.outerHTML = renderAvatarHTML(currentProfile);

        if (currentProfile.username === 'anketo') {
            document.getElementById('admin-panel-btn').style.display = 'block';
        }
    }

    function showApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        loadActiveChats();
        listenMessages();
    }

    async function register() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const displayName = document.getElementById('display_name').value.trim();
        const username = cleanUsername(document.getElementById('username').value);

        if (!email || !password || !username || !displayName) return alert("Заполните все поля!");

        const { data, error } = await db.auth.signUp({ email, password });
        if (error) return alert("Ошибка: " + error.message);

        const { error: profileError } = await db.from('profiles').insert([{
            id: data.user.id,
            username: username,
            display_name: displayName,
            is_verified: username === 'anketo'
        }]);

        if (profileError) return alert("Ошибка: " + profileError.message);
        alert("Успешно! Нажмите 'Войти'.");
    }

    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        const { data, error } = await db.auth.signInWithPassword({ email, password });
        if (error) return alert("Ошибка входа: " + error.message);

        currentUser = data.user;
        await loadProfile();
        showApp();
    }

    async function logout() {
        await db.auth.signOut();
        location.reload();
    }

    async function loadActiveChats() {
        const { data: messages } = await db.from('messages')
            .select('sender_id, receiver_id')
            .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`);

        const activeUserIds = new Set();
        if (messages) {
            messages.forEach(m => {
                if (m.sender_id !== currentUser.id) activeUserIds.add(m.sender_id);
                if (m.receiver_id !== currentUser.id) activeUserIds.add(m.receiver_id);
            });
        }

        if (activeUserIds.size === 0) {
            document.getElementById('user-list').innerHTML = '<div style="padding:20px; color:#94a3b8; text-align:center; font-size:14px;">Чатов нет.<br>Найдите собеседника!</div>';
            return;
        }

        const { data: profiles } = await db.from('profiles').select('*').in('id', Array.from(activeUserIds));
        renderUserList(profiles);
    }

    function onSearchInput() {
        const q = document.getElementById('search').value.trim();
        if (!q) loadActiveChats();
        else searchUsers(q);
    }

    async function searchUsers(query) {
        const cleanQ = cleanUsername(query);
        const { data } = await db.from('profiles')
            .select('*')
            .neq('id', currentUser.id)
            .or(`username.ilike.%${cleanQ}%,display_name.ilike.%${query}%`);

        renderUserList(data);
    }

    function renderUserList(profiles) {
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        if (profiles) {
            profiles.forEach(user => {
                const verifiedTag = user.is_verified ? '<span class="verified">✔</span>' : '';
                list.innerHTML += `
                    <div class="user-item" onclick="selectChat('${user.id}', '${user.display_name || user.username}', '${user.username}', '${user.avatar_url || ''}', ${user.is_verified})">
                        ${renderAvatarHTML(user)}
                        <div class="user-info">
                            <span class="name">${user.display_name || user.username} ${verifiedTag}</span>
                            <span class="sub">@${user.username}</span>
                        </div>
                    </div>`;
            });
        }
    }

    async function selectChat(id, displayName, username, avatarUrl, isVerified) {
        selectedUser = { id, displayName, username, avatarUrl, isVerified };
        const verifiedTag = isVerified ? '<span class="verified">✔</span>' : '';
        document.getElementById('chat-header-title').innerHTML = `${displayName} ${verifiedTag} <br><small style="color:#94a3b8; font-weight:normal;">@${username}</small>`;
        document.getElementById('app').classList.add('chat-open');
        loadMessages();
    }

    function closeChatMobile() { document.getElementById('app').classList.remove('chat-open'); }

    async function loadMessages() {
        if (!selectedUser) return;
        const { data } = await db.from('messages')
            .select('*')
            .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${selectedUser.id}),and(sender_id.eq.${selectedUser.id},receiver_id.eq.${currentUser.id})`)
            .order('created_at', { ascending: true });

        const box = document.getElementById('messages');
        box.innerHTML = '';
        if (data) {
            data.forEach(m => {
                const isMy = m.sender_id === currentUser.id;
                if (m.text.startsWith('[video]:')) {
                    const videoUrl = m.text.replace('[video]:', '');
                    box.innerHTML += `
                        <div class="msg ${isMy ? 'my' : 'their'} video-msg">
                            <video class="video-note" src="${videoUrl}" controls playsinline></video>
                        </div>`;
                } else {
                    box.innerHTML += `<div class="msg ${isMy ? 'my' : 'their'}">${m.text}</div>`;
                }
            });
        }
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim() || !selectedUser) return;

        await db.from('messages').insert([{
            sender_id: currentUser.id,
            receiver_id: selectedUser.id,
            text: input.value
        }]);
        input.value = '';
        loadActiveChats();
    }

    // 🎥 ЗАПИСЬ И КНОПКИ ЗВУКА/ТАЙМЕРА
    async function startVideoRecording() {
        if (!selectedUser) return alert("Сначала выберите чат!");
        
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 400, height: 400 }, audio: true });
            document.getElementById('video-preview').srcObject = mediaStream;
            document.getElementById('video-preview-modal').style.display = 'flex';

            videoChunks = [];
            recordTimeLeft = 30;
            isMuted = false;
            document.getElementById('mute-btn').textContent = "🔊";
            document.getElementById('video-timer').textContent = "0:30";

            mediaRecorder = new MediaRecorder(mediaStream);
            mediaRecorder.ondataavailable = e => videoChunks.push(e.data);
            mediaRecorder.start();

            clearInterval(recordTimerInterval);
            recordTimerInterval = setInterval(() => {
                recordTimeLeft--;
                const secStr = recordTimeLeft < 10 ? '0' + recordTimeLeft : recordTimeLeft;
                document.getElementById('video-timer').textContent = `0:${secStr}`;

                if (recordTimeLeft <= 0) {
                    stopAndSendVideo();
                }
            }, 1000);

        } catch (err) {
            alert("Не удалось получить доступ к камере: " + err.message);
        }
    }

    // Переключатель звука микрофона
    function toggleMute() {
        if (!mediaStream) return;
        isMuted = !isMuted;
        mediaStream.getAudioTracks().forEach(track => track.enabled = !isMuted);
        document.getElementById('mute-btn').textContent = isMuted ? "🔇" : "🔊";
    }

    async function stopAndSendVideo() {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
        
        clearInterval(recordTimerInterval);

        mediaRecorder.onstop = async () => {
            const blob = new Blob(videoChunks, { type: 'video/webm' });
            const fileName = `note_${Date.now()}.webm`;

            const { data, error } = await db.storage.from('videos').upload(fileName, blob);
            if (error) return alert("Ошибка загрузки видео: " + error.message);

            const { data: { publicUrl } } = db.storage.from('videos').getPublicUrl(fileName);

            await db.from('messages').insert([{
                sender_id: currentUser.id,
                receiver_id: selectedUser.id,
                text: `[video]:${publicUrl}`
            }]);

            cancelVideo();
            loadActiveChats();
        };

        mediaRecorder.stop();
    }

    function cancelVideo() {
        clearInterval(recordTimerInterval);
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
        }
        document.getElementById('video-preview-modal').style.display = 'none';
    }

    function listenMessages() {
        db.channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                if (selectedUser && (payload.new.sender_id === selectedUser.id || payload.new.receiver_id === selectedUser.id)) {
                    loadMessages();
                }
                loadActiveChats();
            })
            .subscribe();
    }

    function openMyProfile() { showProfileModal(currentProfile, true); }

    function openSelectedUserProfile() {
        if (!selectedUser) return;
        db.from('profiles').select('*').eq('id', selectedUser.id).single().then(({ data }) => {
            if (data) showProfileModal(data, false);
        });
    }

    function showProfileModal(profile, isOwner) {
        document.getElementById('view-avatar-box').innerHTML = renderAvatarHTML(profile, true);
        document.getElementById('view-name').innerHTML = (profile.display_name || profile.username) + (profile.is_verified ? ' <span class="verified">✔</span>' : '');
        document.getElementById('view-username').textContent = '@' + profile.username;

        const editSection = document.getElementById('edit-profile-section');
        if (isOwner) {
            document.getElementById('edit-display-name').value = profile.display_name || '';
            editSection.style.display = 'flex';
        } else {
            editSection.style.display = 'none';
        }

        document.getElementById('profile-modal').style.display = 'flex';
    }

    function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }

    async function saveProfile() {
        const newName = document.getElementById('edit-display-name').value.trim();
        const fileInput = document.getElementById('avatar-file-input');
        let avatarBase64 = currentProfile.avatar_url;

        if (fileInput.files && fileInput.files[0]) {
            const file = fileInput.files[0];
            avatarBase64 = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        await db.from('profiles').update({
            display_name: newName,
            avatar_url: avatarBase64
        }).eq('id', currentUser.id);

        closeProfile();
        await loadProfile();
    }

    async function openAdmin() {
        document.getElementById('admin-modal').style.display = 'flex';
        const { data } = await db.from('profiles').select('*').neq('id', currentUser.id);
        const list = document.getElementById('admin-user-list');
        list.innerHTML = '';
        if (data) {
            data.forEach(u => {
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:#0f172a; padding:10px; border-radius:8px;">
                        <span>@${u.username} ${u.is_verified ? '✔' : ''}</span>
                        <div style="display:flex; gap:5px;">
                            <button style="font-size:11px; padding:4px 8px;" onclick="toggleVerify('${u.id}', ${!u.is_verified})">${u.is_verified ? 'Снять ✔' : 'Дать ✔'}</button>
                            <button class="admin-btn" style="font-size:11px; padding:4px 8px;" onclick="deleteUser('${u.id}')">🗑</button>
                        </div>
                    </div>`;
            });
        }
    }

    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }

    async function toggleVerify(userId, status) {
        await db.from('profiles').update({ is_verified: status }).eq('id', userId);
        openAdmin();
    }

    async function deleteUser(userId) {
        if (confirm("Удалить профиль?")) {
            await db.from('profiles').delete().eq('id', userId);
            openAdmin();
            loadActiveChats();
        }
    }
</script>
</body>
</html>
